<script>
var navbarContainer = document.querySelector('.navbar_container');
var navbarMenu = document.querySelector('.navbar_menu');
var navbarHeight = navbarContainer ? navbarContainer.offsetHeight : 80;

function updateNavbarTheme() {
  var sections = document.querySelectorAll('section[data-theme]');
  var currentTheme = null;

  sections.forEach(function (section) {
    var rect = section.getBoundingClientRect();
    if (rect.top <= navbarHeight && rect.bottom > navbarHeight) {
      currentTheme = section.getAttribute('data-theme');
    }
  });

  if (!currentTheme) return;

  if (currentTheme === 'light') {
    navbarContainer.classList.add('is-light');
    navbarContainer.classList.remove('is-dark');
    navbarMenu.classList.add('is-light');
    navbarMenu.classList.remove('is-dark');
  } else if (currentTheme === 'dark') {
    navbarContainer.classList.add('is-dark');
    navbarContainer.classList.remove('is-light');
    navbarMenu.classList.add('is-dark');
    navbarMenu.classList.remove('is-light');
  }
}

window.addEventListener('scroll', updateNavbarTheme);
window.addEventListener('load', updateNavbarTheme);
</script>
